name: "CodeQL Swift Analysis"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Determine Simulator
        run: |
          SIMULATOR=$(xcrun simctl list devices available \
            | grep -oE 'iPhone [0-9]+' \
            | sort -t ' ' -k2 -n \
            | tail -1)
          if [ -z "$SIMULATOR" ]; then
            echo "::error::No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator: $SIMULATOR"
          echo "SIMULATOR=$SIMULATOR" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build for CodeQL
        run: |
          xcodebuild build \
            -project iClaw.xcodeproj \
            -scheme iClaw \
            -destination "platform=iOS Simulator,name=$SIMULATOR,OS=latest" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
