name: iClaw
options:
  bundleIdPrefix: com.iclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - zh-Hans
    - zh-Hant
    - ja
    - ko
    - Base

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    VERSIONING_SYSTEM: apple-generic
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "1"
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: "YES"
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"

targets:
  iClaw:
    type: application
    platform: iOS
    sources:
      - path: iClaw
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: iClaw/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iclaw.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        ENABLE_PREVIEWS: "YES"
        SWIFT_OBJC_BRIDGING_HEADER: ""
    postBuildScripts:
      - script: |
          PLIST="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          [ -f "${PLIST}" ] || exit 0
          COMMIT=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "unknown")
          DIRTY=false
          if ! git -C "${SRCROOT}" diff --quiet HEAD -- ':(exclude,glob)**/Info.plist' 2>/dev/null; then
            DIRTY=true
          fi
          if ! git -C "${SRCROOT}" diff --cached --quiet HEAD -- ':(exclude,glob)**/Info.plist' 2>/dev/null; then
            DIRTY=true
          fi
          /usr/libexec/PlistBuddy -c "Add :GitCommitHash string ${COMMIT}" "${PLIST}" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :GitCommitHash ${COMMIT}" "${PLIST}"
          /usr/libexec/PlistBuddy -c "Add :GitIsDirty bool ${DIRTY}" "${PLIST}" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :GitIsDirty ${DIRTY}" "${PLIST}"
        name: Stamp Git Info
        basedOnDependencyAnalysis: false
    entitlements:
      path: iClaw/iClaw.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.iclaw.app
    dependencies:
      - target: iClawWidgets
      - target: iClawShareExtension

  iClawWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: iClawWidgets
        excludes:
          - Info.plist
      - path: iClaw/Services/BackgroundKeepAlive/CronActivityAttributes.swift
    settings:
      base:
        INFOPLIST_FILE: iClawWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iclaw.app.widgets
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework

  iClawShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iClawShareExtension
        excludes:
          - Info.plist
          - iClawShareExtension.entitlements
      - path: iClaw/Services/Share/SharedContainer.swift
      - path: iClaw/Services/Share/AgentSnapshot.swift
      - path: iClaw/Services/Share/HandoffManifest.swift
    settings:
      base:
        INFOPLIST_FILE: iClawShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iclaw.app.share
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
    entitlements:
      path: iClawShareExtension/iClawShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.iclaw.app
    dependencies:
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: UniformTypeIdentifiers.framework

  iClawTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iClawTests
    dependencies:
      - target: iClaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iclaw.tests
        ENABLE_TESTABILITY: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/iClaw.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/iClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  iClaw:
    build:
      targets:
        iClaw: all
    run:
      config: Debug
    test:
      config: Debug
      testPlans:
        - path: iClaw.xctestplan
          defaultPlan: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
