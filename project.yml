name: iClaw
options:
  bundleIdPrefix: com.iclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  iClaw:
    type: application
    platform: iOS
    sources:
      - path: iClaw
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: iClaw/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iclaw.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        SWIFT_OBJC_BRIDGING_HEADER: iClaw/iClaw-Bridging-Header.h
        OTHER_CFLAGS:
          - "-IiClaw/MicroPython"
          - "-IiClaw/MicroPython/micropython_embed"
          - "-IiClaw/MicroPython/micropython_embed/port"
          - "-Wno-unused-parameter"
          - "-Wno-sign-compare"
          - "-Wno-missing-field-initializers"
          - "-Wno-unreachable-code"
          - "-Wno-unused-variable"
          - "-Wno-error"
          - "-std=c99"
